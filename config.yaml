# chromcov run configuration -- every option with its current default value.
#
# GENERATED by `chromcov gen-config` from the live Config model, so it always
# matches the code. Inputs default to the bundled Park Lab COLO829T test data
# (get it with `chromcov fetch inputs`); point inputs.cram / inputs.reference
# elsewhere to run on your own. CLI flags override anything here.
# Valid flag names: paired, proper_pair, unmapped, mate_unmapped, reverse, mate_reverse, read1, read2, secondary, qcfail, duplicate, supplementary. Integer bitmasks also accepted.

# --- inputs -- default to the bundled Park Lab COLO829T test data ---
inputs:
  # the CRAM to measure (default: bundled COLO829T test data; `chromcov fetch inputs`)
  cram: data/COLO829T_TEST.cram
  # FASTA the CRAM was compressed against (default: bundled GRCh38)
  reference: data/GCA_000001405.15_GRCh38_no_alt_analysis_set.fa
  # CRAM index; null -> <cram>.crai
  index: null
  # reference-M5 preflight check: auto | full | skip
  verify_reference: auto

# --- read filtering (samtools flag/MAPQ semantics) ---
filters:
  # -Q: minimum mapping quality a read must have
  min_mapping_quality: 0
  # -f: require ALL of these flags
  include_flags: []
  # -F: exclude a read if it has ANY of these flags
  # `duplicate` is deliberately NOT excluded by default -- in high-depth cancer
  # data, coordinate collisions make duplicate-marking drop real coverage; add
  # `- duplicate` here to reproduce a standard dedup'd number.
  exclude_flags:
    - unmapped
    - secondary
    - qcfail
    - supplementary
  # -G: exclude a read ONLY if it has ALL of these flags
  exclude_all_flags: []

# --- contig selection -- include globs first, then exclude ---
contigs:
  # explicit subset; overrides include/exclude (default: all)
  # chroms: [chr1, chr2]
  # keep contigs matching these globs
  include: ["chr*"]
  # then drop contigs matching these
  exclude: ["*_alt", "*_random", "chrUn*", "*_decoy", "HLA*", "chrEBV"]

# --- analysis (used only with --full) ---
analysis:
  # windowed-mean bin size (bp)
  window: 10000
  # clip extreme pileup depths into a top bin
  hist_cap: 200000
  # depth cutoffs for breadth-of-coverage
  breadth_thresholds: [1, 5, 10, 15, 20, 30]

# --- copy number (used only with --full) ---
copy_number:
  # assumed baseline ploidy
  ploidy: 2
  # easy-autosomal-median | autosomal-median
  baseline: easy-autosomal-median
  # cap on approx copy number on the scatter y-axis
  scatter_cap_cn: 6.0

# --- QC abnormality-flag thresholds (set any subset; unset keys default) ---
qc:
  gain_cn: 2.5     # CN >= this (autosomes) -> CN_GAIN
  loss_cn: 1.5     # CN <= this (autosomes) -> CN_LOSS
  depleted_cn: 0.25    # CN <= this (any contig) -> CN_DEPLETED
  min_median: 10.0    # median depth < this -> LOW_DEPTH
  uneven_robust_cv: 0.5     # MAD/median > this -> UNEVEN
  min_breadth_20x: 0.7     # breadth@20x < this -> LOW_CALLABLE
  extreme_median_mult: 5.0     # median > this * baseline -> EXTREME_DEPTH

# --- callability strata (SMaHT_Regional_Categorization, GRCh38) ---
# label -> BED[.gz] path. Empty by default. Fetch with `chromcov fetch strata`,
# then fill these in or use --strata.
strata: {}
  # easy: data/SMaHT_easy_hg38.bed.gz
  # difficult: data/SMaHT_difficult_hg38.bed.gz
  # extreme: data/SMaHT_extreme_hg38.bed.gz
  # scatter_min_easy_frac: 0.0   # >0 drops windows mostly outside 'easy' from the scatter

# --- output ---
output:
  # output root
  outdir: out
  # render plots (--full)
  plots: true
